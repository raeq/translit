site_name: translit
site_url: https://translit.readthedocs.io/
site_description: Unicode canonicalization and TR39 confusable analysis — building blocks for text-security pipelines plus standards-based transliteration, powered by Rust
site_author: Richard Quinn
repo_url: https://github.com/raeq/translit
repo_name: raeq/translit
edit_uri: edit/main/docs/
use_directory_urls: false

copyright: "&copy; 2026 the <a href='https://github.com/raeq/translit/graphs/contributors'>translit team</a>."

theme:
  name: readthedocs
  highlightjs: true
  hljs_languages:
    - python
    - rust
    - bash

plugins:
  - search
  - mkdocstrings:
      handlers:
        python:
          paths: [python]
          options:
            show_source: false
            show_root_heading: true
            show_root_full_path: false
            heading_level: 3
            members_order: source
            show_signature_annotations: true
            separate_signature: true
            docstring_style: google

markdown_extensions:
  - admonition
  - tables
  - toc:
      permalink: true
  - def_list
  - footnotes
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.snippets
  - attr_list
  - md_in_html

nav:
  - Home: index.md
  - User Guide:
      - Getting Started: user-guide/getting-started.md
      - Security & Defense:
          - Adversarial-Text Defense: security/adversarial-defense.md
          - Threat Model: THREAT_MODEL.md
          - Confusable Detection: user-guide/confusables.md
      - Transliteration: user-guide/transliteration.md
      - Slugification: user-guide/slugification.md
      - Normalization: user-guide/normalization.md
      - Filename Sanitization: user-guide/filenames.md
      - Text Cleaning: user-guide/text-cleaning.md
      - Text Pipeline: user-guide/pipeline.md
      - Language Support: user-guide/language-support.md
      - Abjad Scripts (Arabic, Persian, Hebrew): user-guide/abjad-transliteration.md
  - API Reference:
      - Overview: api/index.md
      - Core Transforms: api/transforms.md
      - Precompiled Pipelines: api/pipelines.md
      - Predicates: api/predicates.md
      - Grapheme Clusters: api/graphemes.md
      - Encoding: api/encoding.md
      - Classes: api/classes.md
      - Enums & Types: api/enums.md
      - Language Profiles: api/language-profiles.md
      - Exceptions: api/exceptions.md
  - Architecture:
      - Transliteration Engine: architecture/transliteration-engine.md
      - Data Tables & Caching: architecture/data-tables.md
      - Emoji Engine: architecture/emoji-engine.md
      - TextPipeline: architecture/pipeline.md
      - Performance Optimization: architecture/performance.md
      - Security & Hostnames: architecture/security.md
      - Emoji Plugin System: architecture/emoji-plugins.md
      - Testing & Guarantees: architecture/testing-guarantees.md
      - Exhaustive Testing: formal-verification.md
      - Transliteration Comparison: architecture/transliteration-comparison.md
  - Migration:
      - Why Migrate: migration/index.md
      - From Unidecode: migration/from-unidecode.md
      - From python-slugify: migration/from-python-slugify.md
      - From confusable_homoglyphs: migration/from-confusable-homoglyphs.md
      - From pathvalidate: migration/from-pathvalidate.md
      - From anyascii: migration/from-anyascii.md
  - CLI: cli.md
  - Performance: performance.md
  - Benchmarks: benchmarks.md
  - Limitations: limitations.md
  - Changelog: CHANGELOG.md
  - Contributing: CONTRIBUTING.md
  - Releasing: RELEASING.md
  - Dependency upgrades: DEPENDENCY_UPGRADES.md
  - Security: SECURITY.md
