[build-system]
requires = ["maturin>=1.7,<2"]
build-backend = "maturin"

[project]
name = "translit-rs"
version = "0.1.3"
description = "Fast Unicode transliteration (including CJK), slugification, and text normalization — Rust-powered Python library"
readme = "README.md"
requires-python = ">=3.9"
license = "MIT"
license-files = ["LICENSE"]
authors = [
    { name = "Richard Quinn", email = "quinn.richard@gmail.com" },
]
keywords = [
    "unicode", "transliteration", "slug", "ascii", "text", "normalization",
    "CJK", "Chinese", "pinyin", "Japanese", "Korean", "hangul", "romanization",
    "unidecode", "slugify", "filename", "sanitize",
    "homoglyph", "confusable", "grapheme", "encoding",
]
classifiers = [
    "Development Status :: 4 - Beta",
    "Intended Audience :: Developers",
    "Intended Audience :: Science/Research",
    "License :: OSI Approved :: MIT License",
    "Operating System :: OS Independent",
    "Operating System :: POSIX :: Linux",
    "Operating System :: MacOS",
    "Operating System :: Microsoft :: Windows",
    "Typing :: Typed",
    "Programming Language :: Rust",
    "Programming Language :: Python :: Implementation :: CPython",
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3.9",
    "Programming Language :: Python :: 3.10",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
    "Programming Language :: Python :: 3.13",
    "Programming Language :: Python :: 3.14",
    "Topic :: Text Processing",
    "Topic :: Text Processing :: Linguistic",
    "Topic :: Text Processing :: Filters",
    "Topic :: Text Processing :: General",
    "Topic :: Text Processing :: Indexing",
    "Topic :: Software Development :: Internationalization",
    "Topic :: Software Development :: Libraries :: Python Modules",
    "Natural Language :: English",
]

[project.optional-dependencies]
test = [
    "pytest>=8.0",
    "pytest-cov>=5.0",
    "hypothesis>=6.100",
    "mypy>=1.10",
]
dev = [
    "translit-rs[test]",
    "ruff>=0.4",
    "maturin>=1.7,<2",
    "pre-commit>=3.0",
]
bench = [
    "pyperf>=2.6",
    "Unidecode>=1.3",
    "text-unidecode>=1.3",
    "anyascii>=0.3",
    "python-slugify>=8.0",
    "pathvalidate>=3.0",
]
docs = [
    "mkdocs>=1.6",
    "mkdocstrings[python]>=0.24",
    "pymdown-extensions>=10.0",
]

[project.urls]
Homepage = "https://github.com/raeq/translit"
Repository = "https://github.com/raeq/translit"
Documentation = "https://translit.readthedocs.io/"
Issues = "https://github.com/raeq/translit/issues"
Changelog = "https://github.com/raeq/translit/blob/main/CHANGELOG.md"

[tool.maturin]
python-source = "python"
module-name = "translit._translit"
features = ["pyo3/abi3-py39"]

[tool.pytest.ini_options]
testpaths = ["tests"]
addopts = ["-v", "--tb=short"]
markers = [
    "slow: marks tests as slow (deselect with '-m \"not slow\"')",
]

[tool.mypy]
strict = true
warn_return_any = true
warn_unused_configs = true
ignore_missing_imports = true

[tool.ruff]
line-length = 100
target-version = "py39"

[tool.ruff.lint]
select = ["E", "F", "I", "UP", "B"]
ignore = [
    "E501",   # line too long — handled by formatter
]

[tool.ruff.lint.isort]
known-first-party = ["translit"]

[tool.pyright]
pythonVersion = "3.9"
pythonPlatform = "All"
typeCheckingMode = "strict"
include = ["python"]
reportMissingModuleSource = false
