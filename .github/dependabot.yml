version: 2
updates:
  # Keep third-party GitHub Actions (pinned to commit SHAs) up to date.
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    groups:
      actions:
        patterns: ["*"]

  # Rust dependencies — keep Cargo.lock fresh for RustSec advisory scanning (#105).
  - package-ecosystem: "cargo"
    directory: "/"
    schedule:
      interval: "weekly"
    groups:
      cargo:
        patterns: ["*"]

  # Python dependencies (dev/docs/test/bench extras; the package has no runtime deps).
  - package-ecosystem: "uv"
    directory: "/"
    schedule:
      interval: "weekly"
    groups:
      uv:
        patterns: ["*"]
