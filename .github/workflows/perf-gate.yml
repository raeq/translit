name: Perf gate

# #234 CI signal model. Runner image + Python are pinned (gate V9) so the
# deterministic gate is reproducible and ratios bucket by a stable environment.
#
# IMPORTANT (required-check safety): "iai estimated-cycles gate" is a *required*
# status check on `main`. A required check must report a conclusion on EVERY PR,
# so this workflow must NOT use an `on.pull_request.paths` filter — a filtered
# workflow simply never runs for non-matching PRs, leaving the required check
# stuck at "Expected" and blocking the merge forever. Instead the workflow runs
# on every PR; a `changes` job detects whether perf-relevant files were touched,
# and the gate's expensive steps are guarded on that. When nothing perf-relevant
# changed, the gate job still runs and reports success (a cheap shim), so the
# required check is satisfied without doing the work.
on:
  pull_request:

concurrency:
  group: perf-gate-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always
  IAI_RUNNER_VERSION: "0.16.1"
  # The gate metric and threshold (V10/V11): estimated cycles, directional —
  # fails only on a regression beyond this percentage vs the merge-base baseline.
  CYCLES_LIMIT: "EstimatedCycles=5%"

jobs:
  # ── Did this PR touch anything the perf gate cares about? ────────────────
  changes:
    name: detect perf-relevant changes
    runs-on: ubuntu-24.04
    outputs:
      perf: ${{ steps.f.outputs.perf }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - id: f
        run: |
          base="$(git merge-base "origin/${{ github.base_ref }}" HEAD)"
          if git diff --name-only "$base" HEAD \
             | grep -qE '^(src/|benchmarks/|examples/|Cargo\.toml$|build\.rs$|requirements/bench\.txt$|\.github/workflows/perf-gate\.yml$)'; then
            echo "perf=true" >> "$GITHUB_OUTPUT"
            echo "Perf-relevant files changed → gate will run."
          else
            echo "perf=false" >> "$GITHUB_OUTPUT"
            echo "No perf-relevant files changed → gate is a no-op shim."
          fi

  # ── Hard, deterministic, directional gate (V10–V12) ──────────────────────
  # Runs on every PR so the required check always reports. The expensive steps
  # are guarded on `changes.perf`; on a non-perf PR only the notice runs and the
  # job reports success (do NOT add a job-level `if:` — a skipped required job is
  # treated as missing, not satisfied, and would re-introduce the merge block).
  iai-gate:
    name: iai estimated-cycles gate
    needs: changes
    runs-on: ubuntu-24.04
    steps:
      - name: Applicability
        run: |
          if [ "${{ needs.changes.outputs.perf }}" = "true" ]; then
            echo "Perf-relevant changes — running the estimated-cycles gate."
          else
            echo "::notice::No perf-relevant changes — gate trivially satisfied (required-check shim)."
          fi

      - uses: actions/checkout@v6
        if: needs.changes.outputs.perf == 'true'
        with:
          fetch-depth: 0 # need the merge-base and both code versions (V12)
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
        if: needs.changes.outputs.perf == 'true'
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
        if: needs.changes.outputs.perf == 'true'
      - uses: actions/setup-python@v6
        if: needs.changes.outputs.perf == 'true'
        with:
          python-version: "3.12" # pinned interpreter (V9)

      - name: Install Valgrind + iai-callgrind-runner
        if: needs.changes.outputs.perf == 'true'
        run: |
          sudo apt-get update
          sudo apt-get install -y valgrind
          cargo install iai-callgrind-runner --version "${IAI_RUNNER_VERSION}" --locked

      - name: Run the deterministic gate
        if: needs.changes.outputs.perf == 'true'
        env:
          PYO3_PYTHON: python3
        run: |
          set -euo pipefail
          BASE="$(git merge-base origin/${{ github.base_ref }} HEAD)"
          echo "merge-base: $BASE"
          # Gate metric = estimated cycles (cache-sim), built twice with the same
          # rustc; compared directionally vs the merge-base baseline.
          if git cat-file -e "$BASE:benchmarks/bench_iai.rs" 2>/dev/null \
             && git cat-file -e "$BASE:Cargo.toml" 2>/dev/null \
             && git show "$BASE:Cargo.toml" | grep -q 'name = "bench_iai"'; then
            echo "::group::baseline (merge-base)"
            git checkout --detach "$BASE"
            cargo bench --no-default-features --bench bench_iai -- --save-baseline=base
            git checkout -
            echo "::endgroup::"
            echo "::group::PR vs baseline (fail on >${CYCLES_LIMIT} regression)"
            cargo bench --no-default-features --bench bench_iai -- \
              --baseline=base --callgrind-limits="${CYCLES_LIMIT}"
            echo "::endgroup::"
          else
            echo "::notice::bench_iai is not present on the merge-base — bootstrap run."
            echo "Establishing the gate: running the bench once to confirm it executes."
            cargo bench --no-default-features --bench bench_iai -- --save-baseline=pr
          fi

  # ── Informational signals (V13–V15, V3, V5, V19) — never blocks the PR ───
  # NOT a required check, so a clean job-level skip on non-perf PRs is fine.
  perf-signals:
    name: perf signals (flag-only)
    needs: changes
    if: needs.changes.outputs.perf == 'true'
    runs-on: ubuntu-24.04
    continue-on-error: true # flag, do not fail the PR (V13/V14)
    permissions:
      contents: write # append to the perf-results branch (V19)
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Build the release workload + wheel
        env:
          PYO3_PYTHON: python3
        run: |
          cargo build --release --no-default-features --example perf_workload
          pip install maturin[patchelf]
          maturin build --release --out dist
          pip install dist/*.whl

      - name: Install pinned comparators (hash-locked, V7/V8)
        run: pip install --require-hashes -r requirements/bench.txt

      - name: Emit fingerprint (V5/V6)
        env:
          PERF_WORKLOAD_BIN: target/release/examples/perf_workload
        run: |
          python scripts/perf_fingerprint.py --json | tee fingerprint.json
          echo "--- summary ---"
          python scripts/perf_fingerprint.py | sed -n '1,6p'

      - name: Comparator ratio — transliterate axis (V14, interleaved/median, flag-only)
        run: |
          python benchmarks/bench_ratio.py | tee ratio.txt
          python benchmarks/bench_ratio.py --json > ratios.json

      - name: Wall-clock PR vs merge-base (V13, flag-only)
        env:
          PYO3_PYTHON: python3
        run: |
          BASE="$(git merge-base origin/${{ github.base_ref }} HEAD)"
          CRIT=(--warm-up-time 1 --measurement-time 2 --sample-size 10)
          # bench_personas is on the base (unlike the new bench_iai), so this
          # wall-clock delta actually compares. Same runner/session; flag-only.
          git checkout --detach "$BASE"
          cargo bench --no-default-features --bench bench_personas -- --save-baseline base "${CRIT[@]}" || true
          git checkout -
          cargo bench --no-default-features --bench bench_personas -- --baseline base "${CRIT[@]}" | tee wallclock.txt || true

      - name: Short-string per-call — report only (V15)
        run: cargo bench --no-default-features --bench bench_core -- --warm-up-time 1 --measurement-time 2 --sample-size 10 || true

      - name: Hardware counters (V3, Linux)
        run: |
          scripts/perf_stat.sh || echo "::warning::perf_stat unavailable on this runner (no perf events)"
          cat target/perf-stat/summary.txt 2>/dev/null || true

      - name: Upload signals as artifacts
        uses: actions/upload-artifact@v4
        with:
          name: perf-signals
          path: |
            fingerprint.json
            ratios.json
            ratio.txt
            wallclock.txt
            target/perf-stat/summary.txt
          if-no-files-found: ignore

      - name: Append measurement to perf-results (V19, best-effort)
        run: |
          set -e
          # One record = fingerprint + the bucketed comparator ratios (V14), so a
          # perf-results line is self-contained and comparable within its bucket.
          python -c "import json; fp=json.load(open('fingerprint.json')); fp['comparator_ratios']=json.load(open('ratios.json')); print(json.dumps(fp, sort_keys=True))" > record.json
          git fetch origin perf-results
          git worktree add /tmp/pr perf-results
          cat record.json >> /tmp/pr/measurements.jsonl
          echo "" >> /tmp/pr/measurements.jsonl
          cd /tmp/pr
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add measurements.jsonl
          git commit -s -m "perf-results: append measurement (PR #${{ github.event.pull_request.number }}, ${GITHUB_SHA})"
          git push origin perf-results
