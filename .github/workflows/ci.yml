name: CI

on:
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: "-D warnings"

jobs:

  # ── Detect whether code changed ─────────────────────────────────
  changes:
    name: Detect changes
    runs-on: ubuntu-latest
    outputs:
      code: ${{ steps.filter.outputs.code }}
    steps:
      - uses: actions/checkout@v6
      - uses: dorny/paths-filter@d1c1ffe0248fe513906c8e24db8ea791d46f8590  # v3
        id: filter
        with:
          filters: |
            code:
              - '**.py'
              - '**.rs'
              - '**.toml'
              - '**.tsv'
              - '.github/workflows/**'


  # ── Lint and format (Linux only, code changes only) ─────────────
  lint:
    name: Lint & format
    needs: changes
    if: needs.changes.outputs.code == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8  # stable
        with:
          components: clippy, rustfmt
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32  # v2

      - name: Rust format
        run: cargo fmt --all -- --check

      - name: Rust clippy
        run: cargo clippy --no-default-features -- -D warnings

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install Python lint tools
        run: pip install ruff==0.15.4 mypy

      - name: Ruff lint
        run: ruff check .

      - name: Ruff format
        run: ruff format --check .

      - name: Type check (mypy)
        run: mypy python/translit --ignore-missing-imports


  # ── Test (Linux only, code changes only) ────────────────────────
  test:
    name: Test (ubuntu-latest, Python 3.12)
    needs: [changes, lint]
    if: needs.changes.outputs.code == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8  # stable
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32  # v2

      - name: Rust tests
        run: cargo test --no-default-features

      - name: Install maturin
        run: pip install maturin[patchelf]

      - name: Build wheel and install
        run: |
          maturin build --out dist
          pip install dist/*.whl
          pip install ".[test]"
          pip install pytest-cov

      - name: Run tests
        run: pytest tests/ --ignore=tests/test_typing.py -m "not formal and not hypothesis" -q --tb=short --cov=translit --cov-report=xml --cov-report=term-missing

      - name: Run doctests
        run: |
          TRANSLIT_DIR=$(python -c "import translit, os; print(os.path.dirname(translit.__file__))")
          pytest --doctest-modules "$TRANSLIT_DIR/__init__.py" "$TRANSLIT_DIR/_compat.py" -q

      - name: Upload coverage report
        uses: actions/upload-artifact@v7
        with:
          name: coverage-report
          path: coverage.xml


  # ── Status gates (always run, for branch protection) ────────────
  # These MUST run on every PR so branch protection checks report.
  # On doc-only PRs, lint/test are skipped — gates pass automatically.
  # On code PRs, gates pass only if lint+test succeed.
  rust-ok:
    name: Rust checks passed
    if: always()
    needs: [changes, lint, test]
    runs-on: ubuntu-latest
    steps:
      - run: |
          CODE="${{ needs.changes.outputs.code }}"
          LINT="${{ needs.lint.result }}"
          TEST="${{ needs.test.result }}"

          if [[ "$CODE" != "true" ]]; then
            echo "No code changes — skipping checks"
            exit 0
          fi

          if [[ "$LINT" != "success" || "$TEST" != "success" ]]; then
            echo "lint ($LINT) or test ($TEST) failed"
            exit 1
          fi

  python-ok:
    name: Python checks passed
    if: always()
    needs: [changes, lint, test]
    runs-on: ubuntu-latest
    steps:
      - run: |
          CODE="${{ needs.changes.outputs.code }}"
          LINT="${{ needs.lint.result }}"
          TEST="${{ needs.test.result }}"

          if [[ "$CODE" != "true" ]]; then
            echo "No code changes — skipping checks"
            exit 0
          fi

          if [[ "$LINT" != "success" || "$TEST" != "success" ]]; then
            echo "lint ($LINT) or test ($TEST) failed"
            exit 1
          fi
