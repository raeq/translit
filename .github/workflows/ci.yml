name: CI

on:
  pull_request:
    branches: [main]
  schedule:
    - cron: "0 5 * * 1"  # Weekly RustSec advisory scan (Monday 05:00 UTC)

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: "-D warnings"

jobs:

  # ── Detect whether code changed ─────────────────────────────────
  changes:
    name: Detect changes
    runs-on: ubuntu-latest
    outputs:
      code: ${{ steps.filter.outputs.code }}
      docs: ${{ steps.filter.outputs.docs }}
    steps:
      - uses: actions/checkout@v6
      - uses: dorny/paths-filter@fbd0ab8f3e69293af611ebaee6363fc25e6d187d  # v4.0.1
        id: filter
        with:
          filters: |
            code:
              - '**.py'
              - '**.rs'
              - '**.toml'
              - '**.tsv'
              - '.github/workflows/**'
            docs:
              - 'docs/**'
              - 'mkdocs.yml'
              - '**.md'
              - '.github/workflows/**'


  # ── Lint and format (Linux only, code changes only) ─────────────
  lint:
    name: Lint & format
    needs: changes
    if: needs.changes.outputs.code == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8  # stable
        with:
          components: clippy, rustfmt
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32  # v2

      - name: Rust format
        run: cargo fmt --all -- --check

      - name: Rust clippy
        # --all-targets so test and bench code is linted too (it rots otherwise).
        run: cargo clippy --all-targets --no-default-features -- -D warnings

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install Python lint tools
        run: pip install ruff==0.15.4 mypy

      - name: Ruff lint
        run: ruff check .

      - name: Ruff format
        run: ruff format --check .

      - name: Type check (mypy)
        run: mypy python/disarm --ignore-missing-imports


  # ── Test (Linux only, code changes only) ────────────────────────
  test:
    name: Test (ubuntu-latest, Python 3.12)
    needs: [changes, lint]
    if: needs.changes.outputs.code == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8  # stable
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32  # v2

      - name: Rust tests
        run: cargo test --no-default-features

      - name: Install maturin
        run: pip install maturin[patchelf]

      - name: Build wheel and install
        run: |
          maturin build --out dist
          pip install dist/*.whl
          pip install ".[test]"
          pip install pytest-cov

      - name: Run tests
        run: pytest tests/ --ignore=tests/test_typing.py -m "not formal and not hypothesis" -q --tb=short --cov=disarm --cov-report=xml --cov-report=term-missing

      - name: Run doctests
        run: |
          DISARM_DIR=$(python -c "import disarm, os; print(os.path.dirname(disarm.__file__))")
          pytest --doctest-modules "$DISARM_DIR/__init__.py" "$DISARM_DIR/_compat.py" -q

      - name: Upload coverage report
        uses: actions/upload-artifact@v7
        with:
          name: coverage-report
          path: coverage.xml


  # ── Cookbook doc-tests (#154: executable, asserted recipes) ─────
  # Runs on code OR docs changes: a doc example can break from a prose edit
  # or from an API change. Executes the allowlisted recipes in docs/conftest.py
  # against the built wheel, so a wrong/broken example turns CI red.
  doc-tests:
    name: Doc tests (Sybil)
    needs: changes
    if: needs.changes.outputs.code == 'true' || needs.changes.outputs.docs == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8  # stable
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32  # v2

      - name: Install maturin
        run: pip install maturin[patchelf]

      - name: Build wheel and install
        run: |
          maturin build --out dist
          pip install dist/*.whl
          pip install ".[test]"

      - name: Anti-rot doc-claim lint (#156)
        run: python3 scripts/check_doc_claims.py

      - name: Run cookbook doc-tests (per-file isolated)
        run: python3 scripts/run_doc_tests.py


  # ── Security audit (#105: cargo audit for RustSec advisories) ──
  # Runs on every PR and weekly. Cargo.lock is not committed (it is .gitignored
  # for this library), so generate it before auditing.
  cargo-audit:
    name: Cargo audit (RustSec)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6

      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8  # stable

      - name: Generate Cargo.lock
        run: cargo generate-lockfile

      - name: Run cargo audit
        uses: rustsec/audit-check@69366f33c96575abad1ee0dba8212993eecbe998  # v2.0.0
        with:
          token: ${{ secrets.GITHUB_TOKEN }}


  # ── Supply-chain policy gate (#260: licenses, bans, sources via cargo-deny) ──
  # Runs on every PR (like cargo audit): a dependency's license or source can
  # change without any code change here. Cargo.lock is gitignored, so generate it
  # first; the policy lives in deny.toml.
  cargo-deny:
    name: Cargo deny (supply-chain)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6

      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8  # stable

      - name: Generate Cargo.lock
        run: cargo generate-lockfile

      - name: Run cargo deny
        uses: EmbarkStudios/cargo-deny-action@8a45e1c7c9a95dfae3276e89a553705e40ae45a2  # v2.0.20
        with:
          # licenses / bans / sources only — RustSec advisories are owned by the
          # dedicated `cargo audit` job above (#260).
          command: check licenses bans sources


  # ── Status gates (always run, for branch protection) ────────────
  # These MUST run on every PR so branch protection checks report.
  # On doc-only PRs, lint/test are skipped — gates pass on those.
  # The RustSec audit, however, blocks merge on EVERY PR (#195): an advisory can
  # land on a dependency without any code change here.
  rust-ok:
    name: Rust checks passed
    if: always()
    needs: [changes, lint, test, cargo-audit, cargo-deny]
    runs-on: ubuntu-latest
    steps:
      - run: |
          CODE="${{ needs.changes.outputs.code }}"
          LINT="${{ needs.lint.result }}"
          TEST="${{ needs.test.result }}"
          AUDIT="${{ needs['cargo-audit'].result }}"
          DENY="${{ needs['cargo-deny'].result }}"

          # A RustSec advisory blocks merge regardless of code changes (#195).
          if [[ "$AUDIT" != "success" ]]; then
            echo "cargo audit ($AUDIT) — an outstanding RustSec advisory blocks merge"
            exit 1
          fi

          # A supply-chain policy violation (license/ban/source) blocks merge on
          # every PR (#260): a dependency's license or source can change without
          # any code change here.
          if [[ "$DENY" != "success" ]]; then
            echo "cargo deny ($DENY) — a supply-chain policy violation blocks merge"
            exit 1
          fi

          if [[ "$CODE" != "true" ]]; then
            echo "No code changes — skipping lint/test gate"
            exit 0
          fi

          if [[ "$LINT" != "success" || "$TEST" != "success" ]]; then
            echo "lint ($LINT) or test ($TEST) failed"
            exit 1
          fi

  python-ok:
    name: Python checks passed
    if: always()
    needs: [changes, lint, test, doc-tests]
    runs-on: ubuntu-latest
    steps:
      - run: |
          CODE="${{ needs.changes.outputs.code }}"
          DOCS="${{ needs.changes.outputs.docs }}"
          LINT="${{ needs.lint.result }}"
          TEST="${{ needs.test.result }}"
          DOCTESTS="${{ needs['doc-tests'].result }}"

          # Cookbook doc-tests run on code OR docs changes (#154); a doc example
          # can break from either. Block merge if they ran and did not pass.
          if [[ "$CODE" == "true" || "$DOCS" == "true" ]]; then
            if [[ "$DOCTESTS" != "success" ]]; then
              echo "doc-tests ($DOCTESTS) failed"
              exit 1
            fi
          fi

          if [[ "$CODE" != "true" ]]; then
            echo "No code changes — skipping lint/test checks"
            exit 0
          fi

          if [[ "$LINT" != "success" || "$TEST" != "success" ]]; then
            echo "lint ($LINT) or test ($TEST) failed"
            exit 1
          fi
