name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: "-D warnings"

jobs:
  rust-check:
    name: Rust check, clippy & test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt
      - uses: Swatinem/rust-cache@v2
      - run: cargo fmt --check
      - run: cargo check --no-default-features
      - run: cargo clippy --no-default-features -- -D warnings
      - run: cargo test --no-default-features

  build-and-test:
    name: Build & test (${{ matrix.os }}, Python ${{ matrix.python-version }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        python-version: ["3.9", "3.10", "3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Install maturin (Linux)
        if: runner.os == 'Linux'
        run: pip install maturin[patchelf]
      - name: Install maturin (macOS / Windows)
        if: runner.os != 'Linux'
        run: pip install maturin
      - name: Build wheel and install test deps
        run: |
          maturin build --out dist
          pip install dist/*.whl
          pip install ".[test]"
          pip install pytest-cov
      - name: Run tests
        run: pytest tests/ --ignore=tests/test_typing.py -q --tb=short --cov=translit --cov-report=xml --cov-report=term-missing
      - name: Run doctests
        shell: bash
        run: |
          TRANSLIT_DIR=$(python -c "import translit, os; print(os.path.dirname(translit.__file__))")
          pytest --doctest-modules "$TRANSLIT_DIR/__init__.py" "$TRANSLIT_DIR/_compat.py" -q
      - name: Upload coverage report
        if: matrix.os == 'ubuntu-latest' && matrix.python-version == '3.12'
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage.xml
      - name: Lint (ruff)
        run: |
          pip install ruff
          ruff check python/ tests/
      - name: Type check (mypy)
        run: |
          pip install mypy
          mypy python/translit/__init__.py --ignore-missing-imports

  bench:
    name: Benchmarks (compile + smoke test)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Criterion benchmarks (short run)
        run: cargo bench --no-default-features --bench bench_core -- --warm-up-time 1 --measurement-time 2 --sample-size 10
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install maturin (Linux)
        if: runner.os == 'Linux'
        run: pip install maturin[patchelf]
      - name: Install maturin (macOS / Windows)
        if: runner.os != 'Linux'
        run: pip install maturin
      - name: Python quick benchmarks
        run: |
          maturin build --out dist
          pip install dist/*.whl
          python benchmarks/bench_quick.py
