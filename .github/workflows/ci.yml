name: CI

on:
  pull_request:
    branches: [main]
    paths:
      - "**.py"
      - "**.rs"
      - "**.toml"
      - "**.tsv"
      - ".github/workflows/**"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: "-D warnings"

jobs:

  # ── Lint and format (Linux only) ────────────────────────────────
  lint:
    name: Lint & format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt
      - uses: Swatinem/rust-cache@v2

      - name: Rust format
        run: cargo fmt --all -- --check

      - name: Rust clippy
        run: cargo clippy --no-default-features -- -D warnings

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install Python lint tools
        run: pip install ruff mypy

      - name: Ruff lint
        run: ruff check .

      - name: Ruff format
        run: ruff format --check .

      - name: Type check (mypy)
        run: mypy python/translit --ignore-missing-imports


  # ── Test (Linux only for PRs) ───────────────────────────────────
  test:
    name: Test (ubuntu-latest, Python 3.12)
    needs: lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2

      - name: Rust tests
        run: cargo test --no-default-features

      - name: Install maturin
        run: pip install maturin[patchelf]

      - name: Build wheel and install
        run: |
          maturin build --out dist
          pip install dist/*.whl
          pip install ".[test]"
          pip install pytest-cov

      - name: Run tests
        run: pytest tests/ --ignore=tests/test_typing.py -q --tb=short --cov=translit --cov-report=xml --cov-report=term-missing

      - name: Run doctests
        run: |
          TRANSLIT_DIR=$(python -c "import translit, os; print(os.path.dirname(translit.__file__))")
          pytest --doctest-modules "$TRANSLIT_DIR/__init__.py" "$TRANSLIT_DIR/_compat.py" -q

      - name: Upload coverage report
        uses: actions/upload-artifact@v7
        with:
          name: coverage-report
          path: coverage.xml


  # ── Status gates (for branch protection rules) ──────────────────
  # These exist solely to satisfy branch protection required checks.
  # Both check the same conditions — kept as two jobs for backward
  # compatibility with existing branch protection configuration.
  # TODO: consolidate to single "CI passed" after updating branch protection.
  rust-ok:
    name: Rust checks passed
    if: always()
    needs: [lint, test]
    runs-on: ubuntu-latest
    steps:
      - run: |
          if [[ "${{ needs.lint.result }}" != "success" || "${{ needs.test.result }}" != "success" ]]; then
            echo "lint or test failed"
            exit 1
          fi

  python-ok:
    name: Python checks passed
    if: always()
    needs: [lint, test]
    runs-on: ubuntu-latest
    steps:
      - run: |
          if [[ "${{ needs.lint.result }}" != "success" || "${{ needs.test.result }}" != "success" ]]; then
            echo "lint or test failed"
            exit 1
          fi
