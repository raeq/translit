name: Publish to PyPI

on:
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always
  PACKAGE_NAME: disarm

jobs:
  # ── Tier 3 release gate (#159, epic #326) ───────────────────────
  # The exhaustive Rust domain tests (#[ignore]) and the Python formal
  # invariants (@pytest.mark.formal) are intentionally excluded from the
  # fast PR CI (ci.yml). On a release/publish they become a HARD gate:
  # every build job `needs:` this, and so does `publish`, so a Tier-3
  # failure blocks the upload to PyPI (no wheels are even built). The
  # #[ignore] / @pytest.mark.formal markers stay intact — they are
  # re-enabled here explicitly via `-- --ignored` / `-m formal`.
  # Cargo.lock is gitignored for this library, so it is generated in CI.
  tier3:
    name: Tier 3 (exhaustive + formal)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8  # stable
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32  # v2

      - name: Rust exhaustive domain tests (Tier 3)
        run: cargo test --no-default-features --test exhaustive_transliterate -- --ignored

      - name: Install maturin
        # Pin to the same range as the project's build-system requirement
        # (pyproject: maturin>=1.13.3,<2) so a future maturin 2.x can't break the gate.
        run: pip install "maturin[patchelf]>=1.13.3,<2"

      - name: Build wheel and install (for formal invariants)
        run: |
          maturin build --out dist
          # Install the test dependencies, then force the freshly-built WHEEL as
          # the installed `disarm`. `.[test]` alone would (re)build disarm from the
          # source checkout and shadow the wheel; --force-reinstall --no-deps swaps
          # only the package so the formal invariants run against the release
          # artifact, not a source rebuild.
          pip install ".[test]"
          pip install --force-reinstall --no-deps dist/*.whl

      - name: Python formal invariant tests (Tier 3)
        run: pytest -m formal

  build-sdist:
    name: Build source distribution
    runs-on: ubuntu-latest
    needs: tier3
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: Build sdist
        uses: PyO3/maturin-action@e83996d129638aa358a18fbd1dfb82f0b0fb5d3b  # v1
        with:
          command: sdist
          args: --out dist
      - uses: actions/upload-artifact@v7
        with:
          name: dist-sdist
          path: dist/*.tar.gz

  build-wheels-linux:
    name: Build wheels (Linux ${{ matrix.target }})
    runs-on: ubuntu-latest
    needs: tier3
    strategy:
      fail-fast: false
      matrix:
        target: [x86_64, aarch64]
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: Build wheels
        uses: PyO3/maturin-action@e83996d129638aa358a18fbd1dfb82f0b0fb5d3b  # v1
        with:
          target: ${{ matrix.target }}
          # Pin the interpreter to 3.10 so maturin builds a single abi3 wheel
          # (cp310-abi3). Without this, maturin enumerates every interpreter in
          # the manylinux container — including interpreters below the
          # abi3-py310 floor — and emits version-specific wheels instead of
          # cp310-abi3 (see issue #26). abi3-py310 wheels are forward-compatible
          # with all CPython >= 3.10 (#277 lever 1: fastcall + AsUTF8AndSize).
          args: --release --out dist --interpreter 3.10
          manylinux: auto
      - uses: actions/upload-artifact@v7
        with:
          name: dist-linux-${{ matrix.target }}
          path: dist/*.whl

  build-wheels-macos:
    name: Build wheels (macOS ${{ matrix.target }})
    runs-on: ${{ matrix.runner }}
    needs: tier3
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-apple-darwin
            runner: macos-14
          - target: aarch64-apple-darwin
            runner: macos-14
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: Build wheels
        uses: PyO3/maturin-action@e83996d129638aa358a18fbd1dfb82f0b0fb5d3b  # v1
        with:
          target: ${{ matrix.target }}
          args: --release --out dist
      - uses: actions/upload-artifact@v7
        with:
          name: dist-macos-${{ matrix.target }}
          path: dist/*.whl

  build-wheels-windows:
    name: Build wheels (Windows)
    runs-on: windows-latest
    needs: tier3
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: Build wheels
        uses: PyO3/maturin-action@e83996d129638aa358a18fbd1dfb82f0b0fb5d3b  # v1
        with:
          args: --release --out dist
      - uses: actions/upload-artifact@v7
        with:
          name: dist-windows
          path: dist/*.whl

  publish:
    name: Publish to PyPI
    runs-on: ubuntu-latest
    # Depend on tier3 explicitly (belt-and-braces) as well as on the builds:
    # the builds already `needs: tier3`, but naming it here makes the gate
    # self-evident and survives any future build-job restructuring (#159).
    needs: [tier3, build-sdist, build-wheels-linux, build-wheels-macos, build-wheels-windows]
    environment: pypi
    permissions:
      id-token: write
    steps:
      - uses: actions/download-artifact@v8
        with:
          pattern: dist-*
          merge-multiple: true
          path: dist/
      - name: List built artifacts
        run: ls -lh dist/
      - name: Verify Linux wheels are abi3 (guard against regression of #26)
        run: |
          # abi3 wheels are tagged cpXY-abi3 (the abi3 floor — cp310-abi3 since
          # #277/#284 raised it from cp39); a version-specific CPython Linux wheel
          # (e.g. cp38-cp38, cp39-cp39) means the abi3 build was bypassed (#26).
          # The check is floor-agnostic (cp3[0-9]+-abi3) so a future floor bump
          # does not silently re-introduce this stale-guard failure.
          bad=$(ls dist/ | grep -E 'cp3[0-9]+-cp3[0-9]+.*(manylinux|linux)' || true)
          if [ -n "$bad" ]; then
            echo "::error::Found version-specific (non-abi3) CPython Linux wheel(s):"
            echo "$bad"
            exit 1
          fi
          if ! ls dist/ | grep -qE 'cp3[0-9]+-abi3-manylinux.*x86_64'; then
            echo "::error::Missing expected cp3XX-abi3 manylinux x86_64 wheel."
            exit 1
          fi
          echo "OK: Linux wheels are abi3 (cp3XX-abi3), no version-specific CPython wheels."
      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@cef221092ed1bacb1cc03d23a2d87d1d172e277b  # release/v1
        with:
          skip-existing: true
          # PEP 740 provenance: generate + upload a signed attestation for every
          # distribution, binding it to this repo + workflow + commit via the
          # OIDC trusted-publishing identity (#260). Default-on, set explicitly.
          attestations: true

  publish-crate:
    name: Publish crate to crates.io
    runs-on: ubuntu-latest
    # Same Tier-3 release gate as the PyPI path (#159): no publish if the
    # exhaustive/formal suites fail. Publishes the pure default crate — the
    # `disarm::api` surface (#42) — independently of the Python wheels.
    needs: tier3
    environment: crates-io
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8  # stable
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32  # v2

      - name: Verify the pure package (no pyo3 / libpython)
        run: |
          cargo package --no-default-features
          if cargo tree -e no-dev | grep -qi pyo3; then
            echo "::error::pyo3 leaked into the default tree — refusing to publish"
            exit 1
          fi

      - name: Publish to crates.io
        # Requires a CARGO_REGISTRY_TOKEN secret on the `crates-io` environment.
        # Builds/verifies with the default (pure) feature set so no interpreter is
        # needed on the runner. One publish per version; a re-run of an already
        # published version fails by design.
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
        run: cargo publish --no-default-features

  sbom:
    name: SBOM (CycloneDX)
    runs-on: ubuntu-latest
    # Attach the bill of materials to the GitHub Release (not on manual dispatch,
    # which has no release to attach to).
    if: github.event_name == 'release'
    permissions:
      contents: write
    steps:
      # SHA-pin every action in the provenance path (a supply-chain job must not
      # trust mutable tags) and pin the SBOM generator version for reproducible,
      # non-breaking release output.
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8  # stable
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32  # v2
      - name: Generate Cargo.lock
        run: cargo generate-lockfile
      - name: Install cargo-cyclonedx
        run: cargo install cargo-cyclonedx --locked --version 0.5.9
      - name: Generate Rust SBOM (CycloneDX)
        run: cargo cyclonedx --format json --all-features
      - name: Collect SBOM artifact(s)
        run: |
          mkdir -p sbom
          find . -name '*.cdx.json' -not -path './sbom/*' -exec cp {} sbom/ \;
          ls -lh sbom/
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
        with:
          name: sbom-cyclonedx
          path: sbom/*.cdx.json
      - name: Attach SBOM to the GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release upload "${{ github.event.release.tag_name }}" sbom/*.cdx.json --clobber
