name: Publish to PyPI

on:
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always
  PACKAGE_NAME: translit_rs

jobs:
  build-sdist:
    name: Build source distribution
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: Build sdist
        uses: PyO3/maturin-action@v1
        with:
          command: sdist
          args: --out dist
      - uses: actions/upload-artifact@v7
        with:
          name: dist-sdist
          path: dist/*.tar.gz

  build-wheels-linux:
    name: Build wheels (Linux ${{ matrix.target }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        target: [x86_64, aarch64]
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: Build wheels
        uses: PyO3/maturin-action@v1
        with:
          target: ${{ matrix.target }}
          # Pin the interpreter to 3.9 so maturin builds a single abi3 wheel
          # (cp39-abi3). Without this, maturin enumerates every interpreter in
          # the manylinux container — including CPython 3.8, which is below the
          # abi3-py39 floor — and emits a version-specific cp38-cp38 x86_64
          # wheel instead of cp39-abi3 (see issue #26). abi3-py39 wheels are
          # forward-compatible with all CPython >= 3.9.
          args: --release --out dist --interpreter 3.9
          manylinux: auto
      - uses: actions/upload-artifact@v7
        with:
          name: dist-linux-${{ matrix.target }}
          path: dist/*.whl

  build-wheels-macos:
    name: Build wheels (macOS ${{ matrix.target }})
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-apple-darwin
            runner: macos-14
          - target: aarch64-apple-darwin
            runner: macos-14
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: Build wheels
        uses: PyO3/maturin-action@v1
        with:
          target: ${{ matrix.target }}
          args: --release --out dist
      - uses: actions/upload-artifact@v7
        with:
          name: dist-macos-${{ matrix.target }}
          path: dist/*.whl

  build-wheels-windows:
    name: Build wheels (Windows)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: Build wheels
        uses: PyO3/maturin-action@v1
        with:
          args: --release --out dist
      - uses: actions/upload-artifact@v7
        with:
          name: dist-windows
          path: dist/*.whl

  publish:
    name: Publish to PyPI
    runs-on: ubuntu-latest
    needs: [build-sdist, build-wheels-linux, build-wheels-macos, build-wheels-windows]
    environment: pypi
    permissions:
      id-token: write
    steps:
      - uses: actions/download-artifact@v8
        with:
          pattern: dist-*
          merge-multiple: true
          path: dist/
      - name: List built artifacts
        run: ls -lh dist/
      - name: Verify Linux wheels are abi3 (guard against regression of #26)
        run: |
          # abi3 wheels are tagged cp39-abi3; a version-specific CPython Linux
          # wheel (e.g. cp38-cp38, cp39-cp39) means the abi3 build was bypassed.
          bad=$(ls dist/ | grep -E 'cp3[0-9]+-cp3[0-9]+.*(manylinux|linux)' || true)
          if [ -n "$bad" ]; then
            echo "::error::Found version-specific (non-abi3) CPython Linux wheel(s):"
            echo "$bad"
            exit 1
          fi
          if ! ls dist/ | grep -qE 'cp39-abi3-manylinux.*x86_64'; then
            echo "::error::Missing expected cp39-abi3 manylinux x86_64 wheel."
            exit 1
          fi
          echo "OK: Linux wheels are abi3 (cp39-abi3), no version-specific CPython wheels."
      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          skip-existing: true

  docker:
    name: Docker
    needs: [publish]
    uses: ./.github/workflows/docker.yml
    with:
      version: ${{ github.ref_name }}
    permissions:
      contents: read
      packages: write
