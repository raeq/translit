name: Docs

on:
  push:
    branches: [main]
    paths:
      - "docs/**"
      - "mkdocs.yml"
      - "python/disarm/**"
      - ".readthedocs.yaml"

permissions:
  contents: read

jobs:
  trigger-rtd-build:
    name: Trigger Read the Docs build
    runs-on: ubuntu-latest
    steps:
      - name: Trigger build
        env:
          RTD_TOKEN: ${{ secrets.RTD_TOKEN }}
        run: |
          if [ -z "$RTD_TOKEN" ]; then
            echo "::warning::RTD_TOKEN secret is not set, skipping docs build trigger"
            exit 0
          fi
          STATUS=$(curl -s -o /tmp/rtd-response.json -w "%{http_code}" -X POST \
            -H "Authorization: Token $RTD_TOKEN" \
            https://app.readthedocs.org/api/v3/projects/disarm/versions/latest/builds/)
          echo "HTTP status: $STATUS"
          cat /tmp/rtd-response.json | python3 -m json.tool 2>/dev/null || cat /tmp/rtd-response.json
          if [ "$STATUS" -ne 202 ]; then
            echo "::error::Read the Docs build trigger failed with status $STATUS"
            exit 1
          fi
