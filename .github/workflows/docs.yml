name: Docs

on:
  push:
    branches: [main]
    paths:
      - "docs/**"
      - "mkdocs.yml"
      - "python/translit/**"
      - ".readthedocs.yaml"

jobs:
  trigger-rtd-build:
    name: Trigger Read the Docs build
    runs-on: ubuntu-latest
    steps:
      - name: Trigger build
        run: |
          curl -s -X POST \
            -H "Authorization: Token ${{ secrets.RTD_TOKEN }}" \
            https://app.readthedocs.org/api/v3/projects/translit/versions/latest/builds/ \
            -o /tmp/rtd-response.json -w "%{http_code}" | {
              read status_code
              echo "HTTP status: $status_code"
              cat /tmp/rtd-response.json | python3 -m json.tool 2>/dev/null || cat /tmp/rtd-response.json
              if [ "$status_code" -ne 202 ]; then
                echo "::error::Read the Docs build trigger failed with status $status_code"
                exit 1
              fi
          }
