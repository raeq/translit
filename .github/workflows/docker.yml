name: Docker

on:
  workflow_call:
    inputs:
      version:
        description: "Package version to install (e.g. 0.1.4)"
        required: true
        type: string
  workflow_dispatch:
    inputs:
      version:
        description: "Package version to install (e.g. 0.1.4)"
        required: true
        type: string

permissions:
  contents: read
  packages: write
  security-events: write  # #132: SARIF upload to GitHub Security tab

jobs:
  build-and-push:
    name: Build & Push Docker Image
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up QEMU
        uses: docker/setup-qemu-action@06116385d9baf250c9f4dcb4858b16962ea869c3  # v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5  # v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee  # v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute tags
        id: tags
        run: |
          VERSION="${{ inputs.version }}"
          VERSION="${VERSION#v}"
          MINOR="${VERSION%.*}"
          echo "full=$VERSION" >> "$GITHUB_OUTPUT"
          echo "minor=$MINOR" >> "$GITHUB_OUTPUT"

      - name: Build and push
        uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf  # v7
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ghcr.io/${{ github.repository }}:latest
            ghcr.io/${{ github.repository }}:${{ steps.tags.outputs.full }}
            ghcr.io/${{ github.repository }}:${{ steps.tags.outputs.minor }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # #132: Scan the pushed amd64 image for CVEs; fail on fixable HIGH/CRITICAL.
  trivy-scan:
    name: Trivy CVE scan (amd64)
    runs-on: ubuntu-latest
    needs: [build-and-push]
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee  # v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute tag
        id: tags
        run: |
          VERSION="${{ inputs.version }}"
          VERSION="${VERSION#v}"   # pushed tag is stripped of any leading 'v'
          echo "full=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Pull pushed image for scanning
        # Trivy checks the local docker daemon before the registry. Pull the
        # concrete platform (amd64) image here so it has a real image to scan,
        # instead of failing to resolve the multi-arch manifest list remotely
        # (MANIFEST_UNKNOWN, #138). Retry to ride out registry propagation lag
        # right after the push.
        run: |
          img="ghcr.io/${{ github.repository }}:${{ steps.tags.outputs.full }}"
          for attempt in 1 2 3 4 5; do
            if docker pull "$img"; then exit 0; fi
            echo "pull failed (attempt ${attempt}/5); waiting for registry propagation..."
            sleep 10
          done
          echo "::error::could not pull ${img} for scanning after 5 attempts"
          exit 1

      - name: Scan image with Trivy
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25  # v0.36.0
        with:
          image-ref: ghcr.io/${{ github.repository }}:${{ steps.tags.outputs.full }}
          format: sarif
          output: trivy-results.sarif
          severity: HIGH,CRITICAL
          ignore-unfixed: true
          trivyignores: .trivyignore

      - name: Upload Trivy SARIF to GitHub Security tab
        uses: github/codeql-action/upload-sarif@v4
        if: always()
        with:
          sarif_file: trivy-results.sarif

  cleanup:
    name: Prune untagged manifests
    runs-on: ubuntu-latest
    needs: [build-and-push]
    steps:
      - uses: actions/delete-package-versions@v5
        with:
          package-name: translit
          package-type: container
          delete-only-untagged-versions: true
          min-versions-to-keep: 0
