name: Docker

on:
  workflow_call:
    inputs:
      version:
        description: "Package version to install (e.g. 0.1.3)"
        required: true
        type: string
  workflow_dispatch:
    inputs:
      version:
        description: "Package version to install (e.g. 0.1.3)"
        required: true
        type: string

permissions:
  contents: read
  packages: write

jobs:
  build-and-push:
    name: Build & Push Docker Image
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute tags
        id: tags
        run: |
          VERSION="${{ inputs.version }}"
          VERSION="${VERSION#v}"
          MINOR="${VERSION%.*}"
          echo "full=$VERSION" >> "$GITHUB_OUTPUT"
          echo "minor=$MINOR" >> "$GITHUB_OUTPUT"

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ghcr.io/${{ github.repository }}:latest
            ghcr.io/${{ github.repository }}:${{ steps.tags.outputs.full }}
            ghcr.io/${{ github.repository }}:${{ steps.tags.outputs.minor }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  cleanup:
    name: Prune untagged manifests
    runs-on: ubuntu-latest
    needs: [build-and-push]
    steps:
      - uses: actions/delete-package-versions@v5
        with:
          package-name: translit
          package-type: container
          delete-only-untagged-versions: true
          min-versions-to-keep: 0
