name: Conversations resolved

# Hard, status-check-based gate that a PR has no unresolved review threads (#55).
# GitHub's "Require conversation resolution before merging" setting only disables the
# merge button and is bypassable; making this a required status check enforces it.
#
# Re-evaluates on PR open/sync and on review submit/edit/dismiss. Note: GitHub Actions
# has NO trigger that fires on pure thread *resolution* (`pull_request_review_thread` is a
# webhook event, not an Actions trigger — using it is a workflow startup failure). So in
# the common flow — a reviewer resolves threads and submits/updates their review — the
# `pull_request_review` event re-runs this and it goes green. If someone resolves the last
# thread WITHOUT any review activity, re-run this check (or push) to refresh it.

on:
  pull_request:
    types: [opened, synchronize, reopened]
  pull_request_review:
    types: [submitted, edited, dismissed]

permissions:
  contents: read
  pull-requests: read

jobs:
  conversations-resolved:
    name: Conversations resolved
    runs-on: ubuntu-latest
    steps:
      - name: Fail if any review thread is unresolved
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
          PR: ${{ github.event.pull_request.number }}
        run: |
          owner="${REPO%/*}"
          name="${REPO#*/}"
          query='query($owner:String!,$name:String!,$pr:Int!){repository(owner:$owner,name:$name){pullRequest(number:$pr){reviewThreads(first:100){nodes{isResolved}}}}}'
          unresolved=$(gh api graphql -f query="$query" -F owner="$owner" -F name="$name" -F pr="$PR" --jq '[.data.repository.pullRequest.reviewThreads.nodes[] | select(.isResolved == false)] | length')
          echo "Unresolved review threads: ${unresolved:-0}"
          if [ "${unresolved:-0}" -gt 0 ]; then
            echo "::error::${unresolved} unresolved review thread(s). Resolve every review conversation before merging."
            exit 1
          fi
          echo "All review threads resolved."
