name: Conversations resolved

# Hard, status-check-based gate that a PR has no unresolved review threads (#55).
# GitHub's "Require conversation resolution before merging" setting only disables the
# merge button and is bypassable; making this a required status check enforces it.
#
# Triggering: GitHub Actions has NO event that fires on pure thread *resolution*
# (`pull_request_review_thread` is a webhook event, not an Actions trigger — using it is a
# workflow startup failure). We re-evaluate on the events that DO exist: PR open/sync,
# review submit/edit/dismiss, and review-comment create/edit/delete (so a newly added
# unresolved thread re-runs the gate and can't leave a stale green). The one gap is
# resolving the *last* thread with no accompanying review/comment activity — re-run this
# check (or push) to refresh it.

on:
  pull_request:
    types: [opened, synchronize, reopened]
  pull_request_review:
    types: [submitted, edited, dismissed]
  pull_request_review_comment:
    types: [created, edited, deleted]

permissions:
  contents: read
  pull-requests: read

jobs:
  conversations-resolved:
    name: Conversations resolved
    runs-on: ubuntu-latest
    steps:
      - name: Fail if any review thread is unresolved
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
          PR: ${{ github.event.pull_request.number }}
        run: |
          owner="${REPO%/*}"
          name="${REPO#*/}"
          # Paginate over ALL review threads (not just the first 100) so a large PR
          # cannot hide unresolved threads beyond the first page and pass incorrectly.
          query='query($owner:String!,$name:String!,$pr:Int!,$endCursor:String){repository(owner:$owner,name:$name){pullRequest(number:$pr){reviewThreads(first:100,after:$endCursor){nodes{isResolved}pageInfo{hasNextPage endCursor}}}}}'
          unresolved=$(gh api graphql --paginate \
            -f query="$query" -F owner="$owner" -F name="$name" -F pr="$PR" \
            --jq '.data.repository.pullRequest.reviewThreads.nodes[].isResolved' \
            | grep -c '^false$' || true)
          echo "Unresolved review threads: ${unresolved:-0}"
          if [ "${unresolved:-0}" -gt 0 ]; then
            echo "::error::${unresolved} unresolved review thread(s). Resolve every review conversation before merging."
            exit 1
          fi
          echo "All review threads resolved."
